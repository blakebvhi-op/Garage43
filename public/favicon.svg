<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .icon { fill: #3b82f6; }
    </style>
  </defs>
  <rect class="bg" width="100" height="100" rx="20"/>
  <g transform="translate(50, 50)">
    <!-- Motorcycle simplified icon -->
    <!-- Front wheel -->
    <circle cx="-20" cy="15" r="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <!-- Rear wheel -->
    <circle cx="20" cy="15" r="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <!-- Frame -->
    <line x1="-18" y1="3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="18" y2="3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="20" y2="15" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <!-- Handlebars -->
    <line x1="-8" y1="-5" x2="8" y2="-5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
